name: Deploy CaptureQuest

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      reset_database:
        description: 'Drop and rebuild the runtime database before deploying'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compute runtime asset cache key
        id: asset-cache-key
        run: |
          set -euo pipefail
          extractor_sha="$(git -C tools/pokemon-gameboy-extractor-tool rev-parse HEAD)"
          pipeline_hash="$(
            {
              printf 'extractor=%s\n' "$extractor_sha"
              git ls-files -s \
                .github/workflows/deploy.yml \
                package-lock.json \
                scripts/bootstrap_capturequest.sh \
                scripts/generate_dungeon_hole_warps.py \
                scripts/generate_audio_manifest.mjs \
                scripts/sync_extractor_assets.py \
                scripts/sync_extractor_audio_manifest.mjs \
                server/cmd/import-script-candidates \
                public/phaser/sprites \
                2>/dev/null
            } | sha256sum | awk '{print $1}'
          )"
          echo "key=cq-runtime-assets-v1-${pipeline_hash}" >> "$GITHUB_OUTPUT"

      - name: Restore generated runtime assets
        id: runtime-assets-cache
        uses: actions/cache@v4
        with:
          path: |
            public/assets/pokemon
            public/assets/trainers
            public/phaser/assets
            public/phaser/pokemon.db
            public/phaser/style.css
            public/phaser/tile_images
            public/phaser/sprites
            public/sound/pokemon
            src/constants/audio_manifest.json
            src/constants/pokemon_audio_manifest.json
            server/scripted_events/scripts
            server/scripted_events/*.generated.json
          key: ${{ steps.asset-cache-key.outputs.key }}

      - name: Check generated runtime assets
        id: runtime-assets
        run: |
          set -euo pipefail

          assets_ready() {
            test -s public/phaser/pokemon.db
            test -d public/phaser/assets
            test -n "$(find public/phaser/assets -type f -print -quit)"
            test -d public/phaser/tile_images
            test -n "$(find public/phaser/tile_images -type f -print -quit)"
            test -d public/phaser/sprites
            test -n "$(find public/phaser/sprites -type f -print -quit)"
            test -d public/assets/pokemon
            test -n "$(find public/assets/pokemon -type f -print -quit)"
            test -d public/assets/trainers
            test -n "$(find public/assets/trainers -type f -print -quit)"
            test -d public/sound/pokemon
            test -n "$(find public/sound/pokemon -name '*.ogg' -type f -print -quit)"
            test -s src/constants/audio_manifest.json
            test -s src/constants/pokemon_audio_manifest.json
            test -d server/scripted_events/scripts
            test -n "$(find server/scripted_events/scripts -name '*.json' -type f -print -quit)"
            node - <<'NODE'
          const fs = require("fs");
          const manifestPath = "src/constants/pokemon_audio_manifest.json";
          const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
          if (!manifest.music || !manifest.sfx || !manifest.pokemonCries) {
            process.exit(1);
          }
          if (!Array.isArray(manifest.mapMusic) || manifest.mapMusic.length < 200) {
            process.exit(1);
          }
          NODE
            python3 - <<'PY'
          import sqlite3
          conn = sqlite3.connect("public/phaser/pokemon.db")
          try:
              row = conn.execute(
                  "SELECT COUNT(*) FROM script_event_dungeon_hole_warps"
              ).fetchone()
              if row is None or row[0] < 1:
                  raise SystemExit(1)
          finally:
              conn.close()
          PY
          }

          if assets_ready; then
            echo "Generated runtime assets restored from cache."
            echo "needs_generation=false" >> "$GITHUB_OUTPUT"
          else
            echo "Generated runtime assets are missing or incomplete; rebuilding."
            echo "needs_generation=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install extractor system dependencies
        if: steps.runtime-assets.outputs.needs_generation == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bison pkg-config libpng-dev gbsplay vorbis-tools sqlite3
          git clone --depth 1 https://github.com/gbdev/rgbds.git /tmp/rgbds
          make -C /tmp/rgbds -j"$(nproc)"
          sudo make -C /tmp/rgbds install PREFIX=/usr/local
          rgbgfx --version

      - name: Install Node dependencies
        run: |
          npm ci

      - name: Generate runtime assets
        if: steps.runtime-assets.outputs.needs_generation == 'true'
        run: |
          CAPTUREQUEST_RENDER_AUDIO=1 npm run bootstrap:assets

      - name: Verify generated runtime assets
        run: |
          set -euo pipefail
          test -s public/phaser/pokemon.db
          test -d public/sound/pokemon
          test -n "$(find public/sound/pokemon -name '*.ogg' -type f -print -quit)"
          test -d server/scripted_events/scripts
          test -n "$(find server/scripted_events/scripts -name '*.json' -type f -print -quit)"
          node - <<'NODE'
          const fs = require("fs");
          const manifest = JSON.parse(fs.readFileSync("src/constants/pokemon_audio_manifest.json", "utf8"));
          if (!Array.isArray(manifest.mapMusic) || manifest.mapMusic.length < 200) {
            throw new Error(`Expected populated mapMusic metadata, got ${manifest.mapMusic?.length ?? 0}`);
          }
          NODE
          python3 - <<'PY'
          import sqlite3
          conn = sqlite3.connect("public/phaser/pokemon.db")
          try:
              count = conn.execute(
                  "SELECT COUNT(*) FROM script_event_dungeon_hole_warps"
              ).fetchone()[0]
              if count < 1:
                  raise SystemExit("Expected generated dungeon hole warp metadata")
          finally:
              conn.close()
          PY

      - name: Build Frontend
        run: |
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: server/go.sum

      - name: Build Backend
        run: |
          cd server
          GOOS=linux GOARCH=amd64 go build -o server ./cmd/server
          GOOS=linux GOARCH=amd64 go build -o import-phaser ./cmd/import-phaser

      - name: Deploy to Server
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_APP_DIR: ${{ vars.DEPLOY_APP_DIR }}
          RESET_DATABASE: ${{ github.event_name == 'workflow_dispatch' && inputs.reset_database }}
        run: |
          : "${DEPLOY_HOST:?DEPLOY_HOST secret is required}"
          : "${DEPLOY_APP_DIR:?DEPLOY_APP_DIR repository variable is required}"

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_OPTS="-o StrictHostKeyChecking=no -i ~/.ssh/deploy_key"
          HOST="$DEPLOY_HOST"
          APP_DIR="$DEPLOY_APP_DIR"
          CQ_SERVER_STOPPED=false
          cleanup_cq_server() {
            if [ "$CQ_SERVER_STOPPED" = "true" ]; then
              ssh $SSH_OPTS $HOST "sudo systemctl start cq-server" || true
            fi
          }
          trap cleanup_cq_server EXIT

          # Upload frontend
          tar --exclude='._*' --exclude='.DS_Store' -czf - -C dist . | ssh $SSH_OPTS $HOST "mkdir -p $APP_DIR/dist && cd $APP_DIR/dist && tar xzf -"

          # Stop services before overwriting
          ssh $SSH_OPTS $HOST "sudo systemctl stop cq-server"
          CQ_SERVER_STOPPED=true

          # Upload backend
          gzip -c server/server | ssh $SSH_OPTS $HOST "gunzip > $APP_DIR/server/server && chmod +x $APP_DIR/server/server"
          gzip -c server/import-phaser | ssh $SSH_OPTS $HOST "gunzip > $APP_DIR/server/import-phaser && chmod +x $APP_DIR/server/import-phaser"
          ssh $SSH_OPTS $HOST "rm -rf $APP_DIR/server/migrations"

          # Upload database/source artifacts for deterministic Postgres imports
          tar --exclude='._*' --exclude='.DS_Store' -czf - -C server/schema . | ssh $SSH_OPTS $HOST "mkdir -p $APP_DIR/server/schema && cd $APP_DIR/server/schema && tar xzf -"
          tar --exclude='._*' --exclude='.DS_Store' -czf - -C server/scripts . | ssh $SSH_OPTS $HOST "mkdir -p $APP_DIR/server/scripts && cd $APP_DIR/server/scripts && tar xzf -"
          gzip -c public/phaser/pokemon.db | ssh $SSH_OPTS $HOST "mkdir -p $APP_DIR/public/phaser && gunzip > $APP_DIR/public/phaser/pokemon.db"

          # Upload file-backed scripted events
          tar --exclude='._*' --exclude='.DS_Store' -czf - -C server/scripted_events . | ssh $SSH_OPTS $HOST "rm -rf $APP_DIR/server/scripted_events && mkdir -p $APP_DIR/server/scripted_events && cd $APP_DIR/server/scripted_events && tar xzf -"

          # Apply tracked runtime schema and refresh deterministic imported data.
          ssh $SSH_OPTS $HOST "set -euo pipefail; cd $APP_DIR; set -a; . /etc/capturequest/cq-server.env; set +a; : \${DATABASE_URL:?DATABASE_URL missing}; if [ \"$RESET_DATABASE\" = \"true\" ]; then psql \"\$DATABASE_URL\" -v ON_ERROR_STOP=1 -c 'DROP SCHEMA IF EXISTS public CASCADE; CREATE SCHEMA public;'; fi; psql \"\$DATABASE_URL\" -v ON_ERROR_STOP=1 -f server/schema/postgres_runtime_schema.sql; cd server; DATABASE_URL=\"\$DATABASE_URL\" ./import-phaser ../public/phaser/pokemon.db"

          # Restart
          ssh $SSH_OPTS $HOST "sudo systemctl start cq-server && sudo systemctl reload caddy"
          CQ_SERVER_STOPPED=false

          rm -f ~/.ssh/deploy_key
